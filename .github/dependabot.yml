version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    # one PR per batch of routine bumps; formisch is exactly pinned, so its RC
    # bumps arrive as their own visible PR to be reviewed deliberately
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
